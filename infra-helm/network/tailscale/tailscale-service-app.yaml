---
apiVersion: v1
kind: Service
metadata:
  name: argocd
  namespace: argocd
  annotations:
    tailscale.com/hostname: "argocd"
    tailscale.com/backend-protocol: "https"
spec:
  selector:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/instance: argocd
  ports:
  - protocol: TCP
    port: 443
    targetPort: 8080
  type: LoadBalancer
  loadBalancerClass: tailscale
---


